<header class="topbar">
  <nav class="nav">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
    <a routerLink="/create-character" routerLinkActive="active">Create Character</a>
    <a routerLink="/signin" routerLinkActive="active">Sign In</a>
  </nav>

  <div class="auth-panel" *ngIf="isAuth; else signedOut">
    <span>Welcome {{ email }}</span>
    <button (click)="signout()">Sign out</button>
  </div>

  <ng-template #signedOut>
    <a routerLink="/signin" class="btn-link">Sign In</a>
  </ng-template>
</header>

<main>
  <router-outlet></router-outlet>
</main>

<footer class="footer">
  <a routerLink="/signin">Signin</a>
  <a routerLink="/create-character">Create Character</a>
</footer>
